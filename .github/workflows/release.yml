name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(grep -o '"version": "[^"]*"' manifest.json | grep -o '[0-9][^"]*')
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Build ZIP
        run: |
          ZIP_NAME="DownloadZhihu-v${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            background.js \
            content/ \
            export/ \
            lib/ \
            icons/ \
            -x "*.DS_Store"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装方法

            ### Chrome
            1. 下载下方的 `DownloadZhihu-v${{ steps.version.outputs.VERSION }}.zip` 文件
            2. 解压到一个固定位置
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 右上角开启「开发者模式」
            5. 点击「加载已解压的扩展程序」，选择解压后的文件夹

            ### Edge
            1. 下载下方的 `DownloadZhihu-v${{ steps.version.outputs.VERSION }}.zip` 文件
            2. 解压到一个固定位置
            3. 打开 Edge，访问 `edge://extensions/`
            4. 左下角开启「开发人员模式」
            5. 点击「加载解压缩的扩展」，选择解压后的文件夹

            访问知乎任意文章/回答/收藏夹/专栏页面，右下角会出现蓝色浮动按钮。
          files: ${{ env.ZIP_NAME }}

      # ==========================================
      # Chrome Web Store 自动发布
      # ==========================================
      # 方式一：Service Account（推荐，无需 refresh_token）
      #   CHROME_EXTENSION_ID          — 扩展 ID
      #   CHROME_SERVICE_ACCOUNT_JSON  — Service Account JSON 密钥（整个文件内容）
      #
      # 方式二：OAuth 2.0（需要 refresh_token）
      #   CHROME_EXTENSION_ID    — 扩展 ID
      #   CHROME_CLIENT_ID       — OAuth 2.0 客户端 ID
      #   CHROME_CLIENT_SECRET   — OAuth 2.0 客户端密钥
      #   CHROME_REFRESH_TOKEN   — OAuth 2.0 刷新令牌

      # 方式一：Service Account
      - name: Publish to Chrome Web Store (Service Account)
        if: vars.CHROME_STORE_ENABLED == 'true' && vars.CHROME_AUTH_MODE != 'oauth'
        uses: browser-actions/release-chrome-extension@latest
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          extension-path: ${{ env.ZIP_NAME }}
          service-account-json: ${{ secrets.CHROME_SERVICE_ACCOUNT_JSON }}

      # 方式二：OAuth 2.0
      - name: Publish to Chrome Web Store (OAuth)
        if: vars.CHROME_STORE_ENABLED == 'true' && vars.CHROME_AUTH_MODE == 'oauth'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ env.ZIP_NAME }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

      # ==========================================
      # Edge Add-ons 自动发布
      # ==========================================
      # 需要在仓库 Settings → Secrets 中配置：
      #   EDGE_PRODUCT_ID  — 产品 ID（从 Partner Center 获取）
      #   EDGE_CLIENT_ID   — API 客户端 ID
      #   EDGE_API_KEY     — API 密钥（client secret）
      - name: Publish to Edge Add-ons
        if: vars.EDGE_STORE_ENABLED == 'true'
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: ${{ env.ZIP_NAME }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
